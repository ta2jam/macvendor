name: Bug report
description: Report a reproducible correctness, API, UI, migration, or operations failure.
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Do not include MAC-linked personal data, credentials, private evidence, or security vulnerabilities.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.0.2 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - MAC normalization
        - Resolver or data model
        - Public API
        - Web UI
        - Migration or seed
        - Cache or rate limiting
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: State the concrete failure and sanitized output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include exact commands or requests using synthetic data where possible.
      render: shell
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Node.js, PostgreSQL, browser, deployment mode
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues.
          required: true
        - label: This is not a security vulnerability.
          required: true
        - label: I removed secrets, private evidence, and personal data.
          required: true
