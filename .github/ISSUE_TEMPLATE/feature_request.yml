name: Feature request
description: Propose a focused capability with explicit scope and tradeoffs.
title: "feature: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete user or operator problem is unsolved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Smallest useful proposal
      description: Describe behavior, not only UI or implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Contract impact
      description: API, schema, data rights, privacy, compatibility, failure, and rollback impact.
    validations:
      required: true
  - type: textarea
    id: resources
    attributes:
      label: Resource impact
      description: Expected query count, Big-O, memory, I/O, storage, network, and dependency impact.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched issues and roadmap items first.
          required: true
        - label: This request does not silently turn an assignment into a device identity claim.
          required: true
