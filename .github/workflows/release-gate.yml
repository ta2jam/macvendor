name: Release Gate

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-gate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: macvendor
          POSTGRES_PASSWORD: macvendor
          POSTGRES_DB: macvendor_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U macvendor -d macvendor_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://macvendor:macvendor@localhost:5432/macvendor_dev
      TEST_DATABASE_URL: postgresql://macvendor:macvendor@localhost:5432/macvendor_test
      RATE_LIMIT_ENABLED: "false"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - name: Require a SemVer tag reachable from main
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./package.json').version")"
          test "$TAG" = "v$VERSION"
          git fetch --no-tags origin main:refs/remotes/origin/main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Create test database
        run: PGPASSWORD=macvendor createdb -h localhost -U macvendor macvendor_test
      - name: Audit dependencies
        run: npm audit --audit-level=low
      - name: Verify release artifact
        run: npm run verify
