name: macvendor

services:
  database:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: macvendor
      POSTGRES_USER: macvendor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - max_connections=30
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=128MB
    volumes:
      - database_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macvendor -d macvendor"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          cpus: "1.50"
          memory: 1536M
    security_opt:
      - no-new-privileges:true
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

  app:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    init: true
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://macvendor:${POSTGRES_PASSWORD}@database:5432/macvendor
      DATA_CORRECTIONS_EMAIL: ${DATA_CORRECTIONS_EMAIL:-}
      CORRECTION_ENCRYPTION_KEY: ${CORRECTION_ENCRYPTION_KEY:?CORRECTION_ENCRYPTION_KEY is required}
      CORRECTION_ENCRYPTION_KEY_ID: ${CORRECTION_ENCRYPTION_KEY_ID:-primary}
      CORRECTION_DECRYPTION_KEYS: ${CORRECTION_DECRYPTION_KEYS:-{}}
      PUBLIC_ORIGIN: https://macvendor.io
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_BACKEND: postgres
      RATE_LIMIT_SALT: ${RATE_LIMIT_SALT:?RATE_LIMIT_SALT is required}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-10}
      RATE_LIMIT_MAX_COST: ${RATE_LIMIT_MAX_COST:-50}
      TRUST_PROXY: "true"
      CACHE_PURGE_PROVIDER: ${CACHE_PURGE_PROVIDER:-generic}
      CACHE_PURGE_ENDPOINT: ${CACHE_PURGE_ENDPOINT:-}
      CACHE_PURGE_TOKEN: ${CACHE_PURGE_TOKEN:-}
      CACHE_PURGE_REQUIRED: ${CACHE_PURGE_REQUIRED:-false}
      CLOUDFLARE_ZONE_ID: ${CLOUDFLARE_ZONE_ID:-}
    ports:
      - 127.0.0.1:3000:3000
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/readyz"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
    logging:
      driver: local
      options:
        max-size: 10m
        max-file: "3"

volumes:
  database_data:
